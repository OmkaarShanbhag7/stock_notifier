name: Daily Stock Notifier Execution

on:
  schedule:
    - cron: '00 11 * * *'
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4-openssl-dev nlohmann-json3-dev cmake build-essential

    - name: Create Build Environment and Compile
      run: |
        mkdir build
        cd build
        cmake ..
        make

    - name: Run Stock Notifier Engine
      run: |
        cd build
        ./stock_notifier
